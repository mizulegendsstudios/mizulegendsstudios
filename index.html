<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mizu Engine · Navegación Modular</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="esports">

<nav class="hud-nav" id="hud-nav"></nav>
<div id="stage"></div>

<div class="floating-buttons">
    <div class="float-btn" id="themeBtn" tabindex="0">🎨 Cambiar tema</div>
    <div class="float-btn" id="supportBtn" tabindex="0">❤️ Apoyar</div>
</div>

<div id="cookieBar" class="cookie-bar" style="display: none;">
    <p>🍪 Usamos cookies técnicas para recordar tu tema. No datos personales.</p>
    <div style="display: flex; gap: 10px;">
        <button id="moreInfoBtn">ℹ️ Más info</button>
        <button id="acceptCookiesBtn">Aceptar</button>
    </div>
</div>

<div id="infoModal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-card">
        <h3 style="color: var(--hex-gold); margin-bottom: 12px;">Información</h3>
        <p id="modalText"></p>
        <div class="modal-buttons">
            <button id="closeModalBtn">Entendido</button>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="engine.core.js"></script>
<script src="nodes/home.js"></script>
<script src="nodes/enterprise.js"></script>
<script src="nodes/research.js"></script>
<script>
    // Inicialización del motor
    window.onload = () => {
        MizuEngine.init();
        MizuEngine.loadFromURL();
        MizuEngine.attachScrollFocusSync();
        MizuEngine.setupFloatingButtonsFocus();
        MizuEngine.setupSupportButton();
        MizuEngine.setupGlobalFocusRecovery();
        document.getElementById('themeBtn').addEventListener('click', MizuEngine.cycleTheme);
        window.addEventListener('hashchange', MizuEngine.loadFromURL);
        setTimeout(() => MizuEngine.initCookies(), 100);
        
        const resumeAudio = () => {
            if(MizuEngine.AudioEngine.ctx && MizuEngine.AudioEngine.ctx.state === 'suspended') 
                MizuEngine.AudioEngine.ctx.resume();
            document.removeEventListener('click', resumeAudio);
            document.removeEventListener('touchstart', resumeAudio);
        };
        document.addEventListener('click', resumeAudio);
        document.addEventListener('touchstart', resumeAudio);
    };
</script>
</body>
</html>
